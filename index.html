<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="authors" content="Team 5">
        <meta name="description" content="fast-typing-game">
        <meta name="keywords" content="html, css, web, web development, javascript">
        <link rel="icon" href="./assets/media/favicon.png" type="image/x-icon">
        <link rel="stylesheet" href="./assets/style/styles.css" media="all">
        <script src="./assets/script/script.js" defer></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <title>Type-Fast</title>
    </head>
    <body class="theme">
        <button id="themeBtn" class="top-left-btn">Change Theme</button>
        <button id="statsBtn" class="top-left-btn">
            <i class="fa-solid fa-user"></i> Stats
        </button>
        <div class="vol-box">
            <div class="vol-control">
                <span>Vol</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
            </div>
            <button id="muteBtn">Mute</button>
        </div>
        <h1>Welcome to Type-Fast</h1>
        <div id="game">
            <div class="stats">
                <p>Time: <span id="time">99</span>s</p>
                <p>Score: <span id="score">0</span></p>
            </div>
            <h2 id="word">Ready?</h2>
            <input type="text" id="input" placeholder="Type here..." disabled autocomplete="off">
            <button id="startBtn">Start Game</button>
        </div>
        <div id="statsSidebar" class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-circle-user user-main-icon"></i>
            <button id="closeSidebar">&times;</button>
        </div>
        <div class="sidebar-content">
            <h3 style="margin-top: 20px;">Top 3 Scores</h3>
            <ul id="highScoresList">
                <li>1. <span class="score-val">0</span></li>
                <li>2. <span class="score-val">0</span></li>
                <li>3. <span class="score-val">0</span></li>
            </ul>
            <h3>Rank Legend</h3>
            <div class="rank-scroller">
                <div class="rank-item"> Newbie (0-20)</div>
                <div class="rank-item"> Warrior (21-50)</div>
                <div class="rank-item"> Speed Demon (51-80)</div>
                <div class="rank-item"> Type-Fast God (81+)</div>
            </div>
        </div>
        </div>
    </body>
</html>
