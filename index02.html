        <meta name="description" content="Myfirst web page">

        <title>Fast-Typing Game</title>
        <link rel="stylesheet" href="./assets/styles/styles02.css" media="all">

        <h1>SpeedType 99</h1>

        <div id="game">

            <h2 id="word">Press Start</h2>

        <script src="script.js"></script>
